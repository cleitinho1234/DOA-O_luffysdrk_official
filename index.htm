<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUFFYSDRK - Shorts Oficiais</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #0f0f0f; 
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 10px; 
        }
        h1 { font-size: 2.3rem; margin-bottom: 5px; color: #ff0000; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        p { color: #aaaaaa; margin-bottom: 40px; font-size: 1.1rem; }
        
        .grid-shorts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            justify-content: center;
        }
        
        .short-card {
            background: #1f1f1f;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            padding: 12px;
            transition: transform 0.2s;
        }
        .short-card:hover {
            transform: scale(1.02);
        }
        .video-container {
            position: relative;
            padding-bottom: 177.77%; 
            height: 0;
            overflow: hidden;
            border-radius: 12px;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }
        .video-title {
            font-size: 0.95rem;
            font-weight: bold;
            margin: 12px 5px;
            text-align: left;
            color: #f1f1f1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .botoes-interacao {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-interagir {
            flex: 1;
            background: #333333;
            color: #ffffff;
            border: none;
            padding: 8px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: background 0.2s;
        }
        .btn-interagir:hover {
            background: #ff0000;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="grid-shorts">

                </div>

                <div class="botoes-interacao">
                    <a href="https://www.youtube.com/shorts/WVrAsGbSoOE" target="_blank" class="btn-interagir">❤️ Curtir</a>
                    <a href="https://www.youtube.com/shorts/WVrAsGbSoOE" target="_blank" class="btn-interagir">💬 Comentar</a>

            </div>

                <div class="botoes-interacao">
